name: jellyfin_media_management_tool
description: "A powerful cross-platform desktop tool for organizing and managing media files according to Jellyfin naming standards."
publish_to: 'none'

version: 0.9.1+2

environment:
  sdk: ^3.10.4
  # SnackBar.persist (used to keep the "analysis started" toast auto-dismissing
  # even though it has an action) landed in Flutter 3.38.0.
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  file_picker: ^11.0.2
  path: ^1.9.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  provider: ^6.1.5
  file: ^7.0.0
  # In-app image/video preview (video playback via libmpv).
  media_kit: ^1.2.3
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  # Native window control (minimum window size).
  window_manager: ^0.5.2
  # Unzipping downloaded font packages (HarmonyOS Sans / MiSans).
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.18.0

flutter:
  uses-material-design: true
  generate: true

# Windows MSIX packaging (dart run msix:create).
# See https://pub.dev/packages/msix for all options.
msix_config:
  display_name: Jellyfin Media Management Tool
  publisher_display_name: joycai
  # Reverse-DNS identity based on the joycai.cn org. For Microsoft Store
  # submissions, replace identity_name + publisher with the values assigned
  # in Partner Center.
  identity_name: cn.joycai.jellyfinMediaManagementTool
  # MSIX requires a 4-part a.b.c.d version; keep the first three parts in sync
  # with `version:` above. The 4th part must be 0 for Store submissions.
  msix_version: 0.9.1.0
  logo_path: windows/runner/resources/app_icon.png
  # Broad file access is provided by runFullTrust (added automatically for
  # sideloaded packages); internetClient covers the in-app search sites.
  capabilities: internetClient
  architecture: x64
  # Sideload build by default. For the Store set `store: true` and supply the
  # `publisher` (certificate subject) from Partner Center.
  store: false
