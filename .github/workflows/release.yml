name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave empty to read from pubspec.yaml, e.g. 1.2.3)"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a pre-release"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create the release as a draft (review before publishing)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.44.2"
  APP_BASENAME: jellyfin-media-management-tool

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            # pubspec line looks like: version: 0.9.0+1  ->  0.9.0
            VERSION=$(grep -E '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*//' | cut -d'+' -f1 | tr -d '[:space:]')
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve a version" && exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag v$VERSION)"

  build-macos:
    name: Build macOS (DMG)
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create DMG
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          brew install create-dmg
          APP_PATH="build/macos/Build/Products/Release/jellyfin_media_management_tool.app"
          DMG_NAME="${APP_BASENAME}-${VERSION}-macos.dmg"
          mkdir -p dist
          create-dmg \
            --volname "Jellyfin Organizer" \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 180 \
            --icon "jellyfin_media_management_tool.app" 150 180 \
            "dist/${DMG_NAME}" \
            "${APP_PATH}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows (Installer + Portable)
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create portable ZIP
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "dist/${env:APP_BASENAME}-${env:VERSION}-windows-portable.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $zip -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${env:VERSION}" "scripts\inno_setup.iss"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [prepare, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
